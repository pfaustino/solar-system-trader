<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Solar System Trader</title>
    <link rel="stylesheet" href="styles/main.css">
</head>

<body>
    <div id="game-container">
        <canvas id="game-canvas"></canvas>

        <!-- HUD -->
        <div id="hud">
            <!-- Top Left: Econ & Nav -->
            <div id="info-panel">
                <div id="credits">Credits: <span id="credits-value">1000</span></div>
                <div id="location">Loc: <span id="location-value">Earth Orbital</span></div>
            </div>

            <!-- Bottom Left: Ship Status -->
            <div id="ship-stats">
                <div class="stat-bar-container">
                    <div class="stat-label">HULL</div>
                    <div class="stat-bar-bg">
                        <div id="hull-bar" class="stat-bar-fill" style="width: 100%; background: #f00;"></div>
                    </div>
                </div>
                <div class="stat-bar-container">
                    <div class="stat-label">SHIELD</div>
                    <div class="stat-bar-bg">
                        <div id="shield-bar" class="stat-bar-fill" style="width: 100%; background: #00f;"></div>
                    </div>
                </div>
                <div class="stat-bar-container">
                    <div class="stat-label">FUEL</div>
                    <div class="stat-bar-bg">
                        <div id="fuel-bar" class="stat-bar-fill" style="width: 100%; background: #fb0;"></div>
                    </div>
                </div>
                <div class="stat-text-row">
                    <span>Cargo: <span id="cargo-value">0</span>/<span id="cargo-max">20</span></span>
                </div>
            </div>
        </div>

        <!-- Speed indicator -->
        <div id="speed-indicator">
            <span id="speed-value">0</span> km/s
        </div>

        <!-- Target info -->
        <div id="target-info" class="hidden">
            <div id="target-name"></div>
            <div id="target-distance"></div>
            <div id="target-eta"></div>
        </div>

        <!-- Mining HUD -->
        <div id="mining-hud" class="hidden">
            <div class="hud-label">LASER TEMP</div>
            <div class="bar-container small">
                <div id="mining-heat-bar" class="bar-fill heat"></div>
            </div>
            <div id="mining-status">READY</div>
        </div>

        <!-- Notifications -->
        <div id="notification-area"></div>

        <!-- Solar System Map -->
        <div id="solar-map"></div>

        <!-- Controls Hint -->
        <div id="controls-hint">
            <div>[&lt; &gt;] - cycle targets</div>
            <div>[P] - autopilot</div>
            <div>[F] - dock</div>
        </div>

        <!-- Radar -->
        <div id="radar">
            <div id="radar-center"></div>
        </div>

        <!-- 3D Waypoints Container -->
        <div id="waypoints"></div>

        <!-- Crosshair -->
        <div id="crosshair">+</div>

        <!-- Loading screen -->
        <div id="loading-screen">
            <div class="loading-content">
                <h1>SOLAR SYSTEM TRADER</h1>
                <div class="loading-bar">
                    <div class="loading-progress"></div>
                </div>
                <p id="loading-text">Loading assets...</p>
            </div>
        </div>

        <!-- Station UI -->
        <div id="station-ui" class="hidden">
            <div class="panel">
                <div class="station-header">
                    <h2 id="station-name">Station Name</h2>
                    <button id="close-station-btn" class="btn">UNDOCK</button>
                </div>

                <div class="station-content">
                    <div class="station-content">
                        <div class="left-panel">
                            <div class="tab-nav">
                                <button id="tab-trade" class="tab-btn active">MARKET</button>
                                <button id="tab-outfit" class="tab-btn">OUTFITTER</button>
                                <button id="tab-shipyard" class="tab-btn">SHIPYARD</button>
                                <button id="tab-analysis" class="tab-btn hidden">ANALYSIS</button>
                                <button id="tab-missions" class="tab-btn">MISSIONS</button>
                                <button id="tab-fleet" class="tab-btn">FLEET</button>
                            </div>

                            <!-- Trade View -->
                            <div id="view-trade" class="tab-view">
                                <div id="market-list" class="scroll-list">
                                    <!-- Items go here -->
                                </div>
                            </div>

                            <!-- Outfitter View -->
                            <div id="view-outfit" class="tab-view hidden">
                                <div id="upgrade-list" class="scroll-list">
                                    <!-- Upgrades go here -->
                                </div>
                            </div>

                            <!-- Shipyard View -->
                            <div id="view-shipyard" class="tab-view hidden">
                                <div id="shipyard-list" class="scroll-list"></div>
                            </div>

                            <!-- Analysis View -->
                            <div id="view-analysis" class="tab-view hidden">
                                <div id="analysis-grid" class="analysis-grid">
                                    <!-- Grid goes here -->
                                </div>
                            </div>

                            <!-- Missions View -->
                            <div id="view-missions" class="tab-view hidden">
                                <div id="mission-list" class="scroll-list">
                                    <!-- Missions go here -->
                                </div>
                            </div>

                            <!-- Fleet View -->
                            <div id="view-fleet" class="tab-view hidden">
                                <div class="fleet-layout">
                                    <div class="fleet-list-panel">
                                        <h4>Your Fleet</h4>
                                        <div id="fleet-list" class="scroll-list">
                                            <!-- Fleet items -->
                                        </div>
                                    </div>
                                    <div class="fleet-details-panel">
                                        <h4 id="fleet-selected-name">Select Ship</h4>
                                        <div id="fleet-selected-info"></div>
                                        <div id="fleet-actions" class="action-buttons hidden">
                                            <button id="btn-fleet-mission" class="btn">Assign Mission</button>
                                            <button id="btn-fleet-switch" class="btn">Fly Ship</button>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>

                        <div class="ship-column">
                            <h3>SHIP STATUS</h3>
                            <div class="stat-row">
                                <span>Credits:</span>
                                <span id="ui-credits">0</span>
                            </div>
                            <div class="stat-row">
                                <span>Cargo:</span>
                                <span id="ui-cargo">0/20</span>
                            </div>
                            <div class="stat-row">
                                <span>Fuel:</span>
                                <span id="ui-fuel">100%</span>
                            </div>
                            <div class="stat-row">
                                <span>Hull:</span>
                                <span id="ui-hull">100%</span>
                            </div>

                            <div class="action-buttons">
                                <button id="refuel-btn" class="btn">Refuel (10cr)</button>
                                <button id="repair-btn" class="btn">Repair (50cr)</button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Docking Prompt -->
            <div id="dock-prompt" class="hidden">
                PRESS [F] TO DOCK
            </div>
        </div>

        <script type="importmap">
    {
        "imports": {
            "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
            "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
        }
    }
    </script>
        <script type="module" src="src/main.js"></script>
</body>

</html>
